<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Terminal | Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="terminal.css">
</head>
<body>
  <main class="terminal-shell" aria-label="Terminal layout prototype">
    <header class="terminal-header">
      <span class="dot dot-red" aria-hidden="true"></span>
      <span class="dot dot-yellow" aria-hidden="true"></span>
      <span class="dot dot-green" aria-hidden="true"></span>
      <p class="terminal-title">portfolio-terminal</p>
    </header>

    <section class="terminal-body">
      <p><span class="prompt">visitor@portfolio:~$</span> whoami</p>
      <p class="output">full stack engineer</p>
      <p><span class="prompt">visitor@portfolio:~$</span> status</p>
      <p class="output">terminal mode prototype loaded</p>
      <p><span class="prompt">visitor@portfolio:~$</span> next_step</p>
      <p class="output">build command-style navigation and project commands</p>
    </section>
  </main>
</body>
</html>
